<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utilizador</title>
    <script type="module" src="../js/views/navbar-view.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="manifest" href="../manifest.json" />
    <link rel="stylesheet" href="../css/user.css">
</head>

<body>
    <div class="flex-container">
        <h2>O teu Perfil
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" class="bi bi-person"
                viewBox="0 0 16 16">
                <path fill="#8A38F5"
                    d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z" />
            </svg>
        </h2>
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" class="bi bi-gear-wide"
            viewBox="0 0 16 16" data-bs-toggle="modal" data-bs-target="#editModal">
            <path fill="#8A38F5"
                d="M8.932.727c-.243-.97-1.62-.97-1.864 0l-.071.286a.96.96 0 0 1-1.622.434l-.205-.211c-.695-.719-1.888-.03-1.613.931l.08.284a.96.96 0 0 1-1.186 1.187l-.284-.081c-.96-.275-1.65.918-.931 1.613l.211.205a.96.96 0 0 1-.434 1.622l-.286.071c-.97.243-.97 1.62 0 1.864l.286.071a.96.96 0 0 1 .434 1.622l-.211.205c-.719.695-.03 1.888.931 1.613l.284-.08a.96.96 0 0 1 1.187 1.187l-.081.283c-.275.96.918 1.65 1.613.931l.205-.211a.96.96 0 0 1 1.622.434l.071.286c.243.97 1.62.97 1.864 0l.071-.286a.96.96 0 0 1 1.622-.434l.205.211c.695.719 1.888.03 1.613-.931l-.08-.284a.96.96 0 0 1 1.187-1.187l.283.081c.96.275 1.65-.918.931-1.613l-.211-.205a.96.96 0 0 1 .434-1.622l.286-.071c.97-.243.97-1.62 0-1.864l-.286-.071a.96.96 0 0 1-.434-1.622l.211-.205c.719-.695.03-1.888-.931-1.613l-.284.08a.96.96 0 0 1-1.187-1.186l.081-.284c.275-.96-.918-1.65-1.613-.931l-.205.211a.96.96 0 0 1-1.622-.434zM8 12.997a4.998 4.998 0 1 1 0-9.995 4.998 4.998 0 0 1 0 9.996z" />
        </svg>
    </div>
    <p id="user-email"></p>
    <div id="badge-container">

    </div>
    <button class="btn btn-danger" id="logout-btn">Logout</button>

    <!-- Modal -->
    <div class="modal fade modal-lg" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="editModalLabel">Editar Informações</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <div class="modal-body" >
                        <div class="form-check mb-3">
                            <div class="pref-text" style="display:inline-block;margin-right:12px;vertical-align:middle;">
                                <label for="dark-mode-toggle" style="margin:0;font-weight:500;">Modo escuro</label>
                            </div>
                            <label class="switch" aria-label="Ativar modo escuro">
                                <input type="checkbox" id="dark-mode-toggle">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="form-check mb-3">
                            <div class="pref-text" style="display:inline-block;margin-right:12px;vertical-align:middle;">
                                <label for="dyslexic-toggle" style="margin:0;font-weight:500;">Fonte OpenDyslexic</label>
                            </div>
                            <label class="switch" aria-label="Ativar fonte para disléxicos">
                                <input type="checkbox" id="dyslexic-toggle">
                                <span class="slider"></span>
                            </label>
                        </div>
                </div>
                <br>
                <div class="modal-body">
                    <form id="edit-user-form ">
                        <div class="mb-3">
                            <label for="current-password" class="form-label">Password actual</label>
                            <input type="password" class="form-control" id="current-password" placeholder="Introduza a sua password actual" disabled required>
                        </div>
                        <div class="mb-3">
                            <label for="new-password" class="form-label">Nova password</label>
                            <input type="password" class="form-control" id="new-password" placeholder="Introduza a nova password" disabled required>
                        </div>
                        <div class="mb-3">
                            <label for="confirm-password" class="form-label">Confirmar nova password</label>
                            <input type="password" class="form-control" id="confirm-password" placeholder="Confirme a nova password" disabled required>
                        </div>
                        <button type="button" class="btn btn-secondary w-30"id="edit-button">Editar password</button>
                        <button type="submit" class="btn btn-primary btn-submit w-30 d-none" id="btn-submit">Guardar alterações</button>
                    </form>
                </div>
                <br>
                <br>
                <div class="modal-footer">
                    <button class="btn btn-danger delete-btn" id="delete-btn">Eliminar Conta</button>
                </div>

            </div>
        </div>
    </div>

    <script type="module" src="../js/views/user-view.js"></script>
</body>

</html>
