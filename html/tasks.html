<!doctype html>
<html lang="pt-PT">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarefas</title>
  <script type="module" src="../js/views/navbar-view.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="../css/index.css" />
  <link rel="stylesheet" href="../css/tasks.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
  <div class="container flex-column">
    <div id="titlebar">
      <h1 class="text-center m-0">Tarefas</h1>
      <div class="d-flex justify-content-center gap-2">
        <button type="button" class="btn btn-primary" id="add-task-btn">
          Adicionar
        </button>
        <button type="button" class="btn btn-secondary" id="retrieve-tasks-btn">
          Recuperar
        </button>
      </div>
    </div>
    <div class="tasks-body">
      <div class="tasks-menu">
        <div id="tasks-container"></div>
      </div>
      <div class="detailed-tasks">
        <div id="detailed-tasks-container"></div>
      </div>
    </div>
  </div>
  <script type="module" src="../js/views/tasks-view.js"></script>
</body>

</html>
