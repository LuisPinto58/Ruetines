<!doctype html>
<html lang="pt-PT">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarefas</title>
  <script type="module" src="../js/views/navbar-view.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="../css/index.css" />
  <link rel="stylesheet" href="../css/tasks.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
  <div class="container flex-column">
    <div id="titlebar">
      <h2 class="text-center m-0">Tarefas para hoje</h2>
      <div class="d-flex justify-content-center gap-2">
        <button type="button" class="btn btn-primary d-flex align-items-center gap-2" id="add-task-btn">
          <ion-icon name="add-outline" style="font-size: 1.2rem;"></ion-icon>
          Adicionar
        </button>
        <button type="button" class="btn btn-secondary d-flex align-items-center gap-2" id="retrieve-tasks-btn">
          <ion-icon name="arrow-undo-outline" style="font-size: 1.2rem;"></ion-icon>
          Recuperar
        </button>
      </div>
    </div>
    <div class="tasks-body">
      <div class="tasks-menu">
        <div id="tasks-container"></div>
      </div>
      <div class="detailed-tasks">
        <div id="detailed-tasks-container"></div>
      </div>
    </div>
  </div>

  <!-- Premade Tasks - Tarefas Sugeridas  -->
  <div class="container flex-column mt-4">
    <div id="premade-titlebar">
      <h5 class="text-center m-0 jsutify-content-center align-items-center gap-2">
        Tarefas Sugeridas <ion-icon name="sparkles" style="color: #E3C565;"></ion-icon>
      </h5>
    </div>
    <div id="premade-tasks-container" class="premade-tasks-body"></div>
  </div>



  <script type="module" src="../js/views/tasks-view.js"></script>
</body>

</html>
