<!-- SETTINGS -->
<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definições</title>
    <script type="module" src="../js/views/navbar-view.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/settings.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div class="settings-container">

        <!-- Profile Sidebar -->
         <div class="profile-section">
            <div class="avatar" aria-hidden="true">JD</div>
            <h1 class="profile-name">Jane Doe</h1>
            <p class="profile-email">exemplo@email.com</p>
        </div>

        <!-- Settings  -->
         <main class="settings-content">

            <!-- Preferences -->
             <section class="settings-group">
                <h2 class="section-title">Preferências</h2>
                <div class="preference-card">

                    <div class="preference-item">
                        <div class="pref-info">
                            <div class="pref-icon" aria-hidden="true">
                                <i class="fa-solid fa-font"></i>
                            </div>
                            <div class="pref-text">
                                <h4>Fonte para Disléxicos</h4>
                                <p>Open Dyslexic</p>
                            </div>
                        </div>
                        <label class="switch" aria-label="Ativar fonte para disléxicos">
                            <input type="checkbox" id="dyslexic-toggle">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="preference-item">
                        <div class="pref-info">
                            <div class="pref-icon" aria-hidden="true">
                                <i class="fa-solid fa-moon"></i> 
                            </div>
                            <div class="pref-text">
                                <h4>Modo Escuro</h4>
                                <p id="dark-status">Desativado</p>
                            </div>
                        </div>
                        <label class="switch" aria-label="Ativar modo escuro">
                            <input type="checkbox" id="dark-mode-toggle">
                            <span class="slider"></span>
                        </label>
                    </div>

                </div>   
             </section>


             <!-- Password -->
             <section class="settings-group">
                <h2 class="section-title">Alterar Password</h2>

                <div class="password-group">
                    <label for="current-password">Password atual</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock" aria-hidden="true"></i>
                        <input type="password" id="current-password" autocomplete="current-password" placeholder="••••••••">
                    </div>
                </div>

                <div class="password-group">
                    <label for="new-password">Nova password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock" aria-hidden="true"></i>
                        <input type="password" id="new-password" autocomplete="new-password" placeholder="••••••••">
                    </div>
                </div>
                
                <div class="password-group">
                    <label for="confirm-password">Confirmar password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock" aria-hidden:"true"></i>
                        <input type="password" id="confirm-password" autocomplete="confirm-password" placeholder="••••••••">
                    </div>
                </div> 
                
                <button type="button" class="save-btn" id="save-btn">
                    <i class="fa-solid fa-floppy-disk" aria-hidden="true"></i>
                    Guardar alterações
                </button>

             </section>



             <!-- End Session -->
             <section class="settings-group">
                <h2 class="section-title">Sessão</h2>

                <button type="button" class="session-btn" id="logout-btn">
                    <div class="icon-box logout-icon" aria-hidden="true">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    </div>
                    Terminar sessão
                </button>

                <button type="button" class="session-btn" id="delete-btn">
                    <div class="icon-box delete-icon" aria-hidden="true">
                        <i class="fa-solid fa-trash-can"></i>
                    </div>
                    Eliminar conta
                </button>   

             </section>

         </main>
    </div>

</body>
</html>
